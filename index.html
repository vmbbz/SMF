<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>$SMF-STICKLASH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { 
      --neon-green: #00ff9d; 
      --neon-pink: #ff00ff;
      --neon-blue: #00d4ff;
      
      /* DG System Mapping */
      --dg-bg: #050505;
      --dg-grad-start: var(--neon-green);
      --dg-grad-end: var(--neon-pink);
      --dg-primary: var(--neon-green);
      --dg-secondary: var(--neon-pink);
      --dg-border: var(--neon-blue);
      --dg-text: #ffffff;
      --dg-charcoal: #111;
      --dg-pebble: #222;
      --dg-slate: #888;
      --dg-almost-blk: #000;
      --dg-danger: #ff4444;

      --glass-bg: rgba(10, 10, 15, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--dg-bg);
      font-family: 'Press Start 2P', system-ui;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }
    
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url('assets/smf-bg.jpg') no-repeat center center;
      background-size: cover;
    }
    
    #game { 
      width: 100%; 
      height: 100%; 
      display: block; 
      image-rendering: pixelated;
      background: rgba(0,0,0,0.3);
    }
    
    /* UNIFIED NAVIGATION & SCREENS */
    .screen {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      z-index: 1000;
      max-width: 450px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,255,157,0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .screen.hidden {
      display: none !important;
      opacity: 0;
      transform: translate(-50%, -40%) scale(0.9);
    }
    
    .premium-btn {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 20px;
      margin: 10px 0;
      font-size: 14px;
      width: 100%;
      border-radius: 16px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .premium-btn:hover {
      background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
      border-color: transparent;
      color: #000;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0,255,157,0.3);
    }
    
    .premium-btn.pink:hover {
      background: linear-gradient(135deg, var(--neon-pink), #ff0055);
      box-shadow: 0 10px 20px rgba(255,0,255,0.3);
    }
    
    .victory-btn {
      padding: 8px 16px;
      font-size: 12px;
      margin: 0;
      font-weight: bold;
    }
    
    .victory-btn.dark {
      background: #333;
      color: #fff;
    }
    .victory-btn.dark:hover {
      background: #444 !important;
      color: #fff !important;
      box-shadow: 0 10px 20px rgba(255,255,255,0.1);
    }
    
    input {
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      color: var(--neon-green);
      font-size: 14px;
      border-radius: 14px;
      outline: none;
      font-family: inherit;
    }
    
    input:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 15px rgba(0,255,157,0.2);
    }
    
    #victory-overlay {
      background: radial-gradient(circle, rgba(10,10,15,0.95) 0%, rgba(0,0,0,0.98) 100%);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 500px; /* Wider to fit the tucked cards */
      width: 95%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 30px rgba(0,255,157,0.15);
    }
    
    .loser-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }
    
    .rich-tabs button {
      background: transparent;
      color: #888;
      border: none;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      padding: 5px 10px;
      transition: all 0.3s ease;
      border-radius: 6px;
    }
    
    .rich-tabs button.active {
      color: #fff;
      background: rgba(255,0,255,0.2);
      box-shadow: 0 0 10px rgba(255,0,255,0.3);
    }
    
    .rich-tabs button:hover {
      color: #fff;
    }
    
    .ko-text {
      font-size: 110px;
      font-weight: 900;
      font-style: italic;
      color: var(--neon-pink);
      text-shadow: 0 0 40px var(--neon-pink), 0 0 10px #fff;
      margin-top: -50px;
      margin-bottom: 20px;
      letter-spacing: -5px;
      animation: punchIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #victory-token-info {
      display: flex;
      align-items: center;
      gap: 30px;
      background: rgba(255,255,255,0.03);
      padding: 40px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    
    @keyframes punchIn {
      0% { transform: scale(3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    #status { height: 20px; font-size: 11px; margin-top: 10px; color: var(--neon-blue); }
    
    /* Original screens - ensure they fit theme */
    #multiplayer-menu, #character-select, #join-room, #room-lobby, #match-results, #leaderboard, #onboarding {
      display: block; /* reset display:none */
    }
    
    /* =============================================
       MOBILE VIRTUAL JOYSTICK — FULL CONTROL PAD
       Only shown on touch/mobile screens (≤768px or touch device).
       Hidden on desktop via CSS — JS also gates it with isMobile check.
       ============================================= */
    #mobile-controls {
      position: fixed;
      bottom: 62px; /* sits above trending strip */
      left: 0;
      right: 0;
      display: none; /* hidden by default on all screens */
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 16px 12px;
      z-index: 600;
      pointer-events: none;
    }

    /* Left side – joystick zone */
    .joystick-zone {
      pointer-events: auto;
      position: relative;
      width: 140px;
      height: 140px;
      flex-shrink: 0;
    }

    #joystick-base {
      width: 130px;
      height: 130px;
      background: rgba(0,0,0,0.75);
      border: 3px solid rgba(0,255,157,0.6);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 20px rgba(0,255,157,0.25), inset 0 0 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      touch-action: none;
      user-select: none;
    }

    #joystick-knob {
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 35% 35%, rgba(255,0,255,0.9), rgba(180,0,255,0.85));
      border: 2px solid rgba(0,255,157,0.8);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 14px rgba(255,0,255,0.5);
      transition: box-shadow 0.1s;
      pointer-events: none;
    }

    /* Crosshair guides inside joystick */
    #joystick-base::before, #joystick-base::after {
      content: '';
      position: absolute;
      background: rgba(0,255,157,0.12);
      border-radius: 2px;
    }
    #joystick-base::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #joystick-base::after {
      height: 2px; width: 100%;
      top: 50%; transform: translateY(-50%);
    }

    /* Right side – attack buttons */
    .attack-zone {
      pointer-events: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 8px;
      width: 160px;
      flex-shrink: 0;
    }

    .atk-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      font-size: 10px;
      font-weight: 900;
      font-family: inherit;
      letter-spacing: 0.5px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1px;
      transition: transform 0.07s, box-shadow 0.07s;
      touch-action: manipulation;
      user-select: none;
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
    }
    .atk-btn .icon { font-size: 14px; line-height: 1; }
    .atk-btn.active,
    .atk-btn:active {
      transform: scale(0.88);
    }

    /* Button color coding */
    .atk-btn.punch-light  { background: rgba(0,180,255,0.35); border-color: rgba(0,180,255,0.6); box-shadow: 0 0 10px rgba(0,180,255,0.2); }
    .atk-btn.punch-heavy  { background: rgba(80,0,255,0.4);   border-color: rgba(120,60,255,0.7); box-shadow: 0 0 10px rgba(100,0,255,0.3); }
    .atk-btn.kick-light   { background: rgba(255,100,0,0.35); border-color: rgba(255,140,0,0.6);  box-shadow: 0 0 10px rgba(255,100,0,0.2); }
    .atk-btn.kick-heavy   { background: rgba(200,0,60,0.4);   border-color: rgba(255,0,80,0.7);   box-shadow: 0 0 10px rgba(200,0,60,0.3); }
    .atk-btn.btn-jump     { background: rgba(0,255,157,0.2);  border-color: rgba(0,255,157,0.6);  box-shadow: 0 0 12px rgba(0,255,157,0.25); grid-column: span 2; border-radius: 12px; aspect-ratio: auto; padding: 6px; }
    .atk-btn.btn-hadouken { background: rgba(255,220,0,0.2);  border-color: rgba(255,200,0,0.6);  box-shadow: 0 0 12px rgba(255,200,0,0.25); grid-column: span 2; border-radius: 12px; aspect-ratio: auto; padding: 6px; }
    .victory-card, .token-pill {
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      touch-action: manipulation;
    }

    .marquee {
      overflow: hidden;
      white-space: nowrap;
      display: flex;
      gap: 16px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>

  <!-- TRENDING STRIP (Floor level for main menu) -->
  <div id="trending-strip" class="trending-strip" style="position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%); border-top: 3px solid var(--neon-pink); padding: 6px 15px; z-index: 500; backdrop-filter: blur(10px); box-sizing: border-box; box-shadow: 0 -10px 20px rgba(255,0,255,0.15);"></div>

  <!-- TRENDING STRIP (During Fight, hidden by default until fight starts) -->
  <div id="fight-trending-strip" class="trending-strip" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%); border-top: 3px solid var(--neon-green); padding: 6px 15px; z-index: 100; backdrop-filter: blur(10px); box-sizing: border-box; box-shadow: 0 -10px 20px rgba(0,255,157,0.15);"></div>


  <!-- HUD WIDGETS (Bottom Center) - sits above trending strip -->
  <div id="hud-widgets" style="position:fixed; bottom: 65px; left: 50%; transform: translateX(-50%); z-index: 601; display:flex; gap:10px; align-items:center;">
    <!-- SPOTIFY WIDGET -->
    <div id="spotify-widget" class="bottom-panel"></div>
    
    <!-- WEATHER TOGGLE -->
    <button id="btn-weather" onclick="if(window.toggleWeather) window.toggleWeather()" style="background:rgba(0,0,0,0.8); border:2px solid var(--neon-blue); border-radius:30px; color:#fff; padding:8px 16px; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:5px; font-family:inherit; white-space:nowrap; backdrop-filter:blur(5px);">
      🌧️ WEATHER
    </button>
  </div>

  <!-- MEME PANEL (Main Menu) -->
  <div id="meme-panel" class="screen" style="top: 42%;">
    <div style="text-align:center;margin-bottom:30px;">
      <img src="assets/smf-logo.png" alt="$SMF" style="height:80px;margin-bottom:15px;filter: drop-shadow(0 0 10px var(--neon-green));">
      <div style="font-size:24px;color:#fff;font-weight:bold;letter-spacing:2px;text-shadow: 0 0 10px var(--neon-pink);">STICK|LASH</div>
    </div>
    <button class="premium-btn" onclick="startTrendingMode()">TRENDING ARENA 🔥</button>
    <button class="premium-btn" onclick="startEndlessMode()">ENDLESS PUMP STREAM</button>
    <div style="display:flex;gap:10px;margin:10px 0;">
      <input id="mint-input" placeholder="TOKEN MINT..." style="margin:0;flex:1;">
      <button class="premium-btn" onclick="startCustomFight()" style="width:auto;margin:0;padding:10px 20px;">FIGHT</button>
    </div>
    <button class="premium-btn pink" onclick="showMultiplayer()">MULTIPLAYER 🌐</button>
    <div id="status"></div>
  </div>

  <!-- VICTORY OVERLAY -->
  <div id="victory-overlay" class="screen hidden">
    <div id="victory-text" class="ko-text" style="transition: all 1s ease; transform-origin: top center; position: relative; z-index: 10;">YOU WIN!</div>
    
    <div class="cards-container" style="position: relative; width: 100%; height: 350px; margin-top: 15px; perspective: 1200px;">
      <!-- BACK CARD (Dynamically populated) -->
      <div id="loser-card" class="victory-card loser" onclick="if(event.target.tagName!=='BUTTON' && !event.target.closest('button')) toggleCards()" style="position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(1) rotateY(180deg); z-index: 1; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: rgba(15,15,15,0.95); border: 2px solid white; border-radius: 20px; padding: 10px; text-align: center; width: 300px; max-width: 90%; box-sizing: border-box; box-shadow: 0 0 30px var(--neon-pink); overflow-y: auto; max-height: 100%; backface-visibility: hidden;">
        <div id="back-card-content"></div>
      </div>

      <!-- FRONT CARD (Dynamically populated) -->
      <div id="winner-card" class="victory-card winner" onclick="if(event.target.tagName!=='BUTTON' && !event.target.closest('button')) toggleCards()" style="position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(1) rotateY(0deg); z-index: 2; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: rgba(25,25,25,0.95); border: 2px solid white; border-radius: 20px; padding: 10px; text-align: center; width: 300px; max-width: 90%; box-sizing: border-box; box-shadow: 0 0 30px var(--neon-green); backface-visibility: hidden;">
        <div id="front-card-content"></div>
      </div>
    </div>




    <div style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top: 28px; z-index: 10; position: relative; width: 100%;">
      <div style="display:flex; gap:10px; width: 100%; justify-content: center;">
        <button id="btn-buy-token" class="premium-btn victory-btn" style="background:var(--neon-blue);color:#000;">BUY $TICKER 🛒</button>
        <button class="premium-btn pink victory-btn" onclick="shareVictory()">SHARE TO X 🚀</button>
      </div>
      <div style="display:flex; gap:10px; width: 100%; justify-content: center;">
        <button class="premium-btn dark victory-btn" onclick="location.reload()">REMATCH 🥊</button>
        <button class="premium-btn dark victory-btn" onclick="nextFight()">NEXT FIGHT ⏭️</button>
      </div>
    </div>
  </div>

  <!-- VIRTUAL JOYSTICK CONTROLS (Mobile Only) -->
  <div id="mobile-controls">
    <!-- LEFT: Virtual Joystick -->
    <div class="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-knob"></div>
      </div>
    </div>

    <!-- RIGHT: Attack Buttons -->
    <div class="attack-zone">
      <!-- Row 1: Light Punch + Light Kick -->
      <button id="btn-light-punch" class="atk-btn punch-light">
        <span class="icon">👊</span>
        <span>LP</span>
      </button>
      <button id="btn-light-kick" class="atk-btn kick-light">
        <span class="icon">🦵</span>
        <span>LK</span>
      </button>
      <!-- Row 2: Heavy Punch + Heavy Kick -->
      <button id="btn-heavy-punch" class="atk-btn punch-heavy">
        <span class="icon">🔥</span>
        <span>HP</span>
      </button>
      <button id="btn-heavy-kick" class="atk-btn kick-heavy">
        <span class="icon">💥</span>
        <span>HK</span>
      </button>
      <!-- Row 3: Jump (wide) + Hadouken (wide) -->
      <button id="btn-jump" class="atk-btn btn-jump">
        <span class="icon">↑ JUMP</span>
      </button>
      <button id="btn-hadouken" class="atk-btn btn-hadouken">
        <span class="icon">⚡ SPECIAL</span>
      </button>
    </div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="./src/loser-card.js"></script>
  
  <script type="module" src="./src/token-power-scaling.js"></script>
  <script type="module" src="./src/solscan-trending.js"></script>
  <script type="module" src="./src/trending-strip.js"></script>
  
  <script type="module">
    import { getTrendingTokens, getTokenByMint, generatePersonality } from './src/token-utils.js';
    import { Effects } from './src/effects.js';

    // Global exports
    window.getTrendingTokens = getTrendingTokens;
    window.getTokenByMint = getTokenByMint;
    window.generatePersonality = generatePersonality;
    window.effects = new Effects();

    let pumpQueue = [];

    // ================== MAIN MEME FUNCTIONS ==================
    window.startTrendingMode = async () => {
    const status = document.getElementById('status');
    if (status) status.innerHTML = 'Fetching trending tokens...';
    
    try {
      const { getTrendingTokens } = await import('./src/token-utils.js');
      const tokens = await getTrendingTokens(8);
      if (!tokens || tokens.length === 0) throw new Error('No tokens found');
      
      const randomToken = tokens[Math.floor(Math.random() * tokens.length)];
      if (status) status.innerHTML = `Fighting <strong>$${randomToken.symbol}</strong>!`;
      
      // Use unified global setter from main.js
      if (window.setGameMode) window.setGameMode(undefined, 4); // LLM Mode
      
      await window.loadOpponent(randomToken);
    } catch (err) {
      console.error('Trending mode failed:', err);
      if (status) status.innerHTML = 'Failed to load tokens.';
    } finally {
      // FORCE HIDE panel to unblock game
      const memePanel = document.getElementById('meme-panel');
      if (memePanel) memePanel.classList.add('hidden');
      const canvas = document.getElementById('game');
      if (canvas) canvas.classList.add('active');
    }
  };

    window.startEndlessMode = async () => {
      const status = document.getElementById('status');
      status.innerHTML = 'ENDLESS PUMP STREAM — loading...';
      pumpQueue = await getTrendingTokens(12);
      if (pumpQueue.length === 0) {
        status.innerHTML = 'No tokens matched filter — check console for raw data';
        return;
      }
      await loadOpponent(pumpQueue.shift());
    };

    window.startCustomFight = async () => {
      const mint = document.getElementById('mint-input').value.trim();
      if (!mint) return alert('Paste a mint address!');
      await window.fightToken(mint);
    };

    window.fightToken = async (mint) => {
      const status = document.getElementById('status');
      if (status) status.innerHTML = 'Loading token...';
      try {
        const token = await getTokenByMint(mint);
        if (status) status.innerHTML = `Fighting <strong>$${token.symbol}</strong>!`;
        
        // Hide panel
        const memePanel = document.getElementById('meme-panel');
        if (memePanel) memePanel.classList.add('hidden');
        const canvas = document.getElementById('game');
        if (canvas) canvas.classList.add('active');
        
        await loadOpponent(token);
      } catch (e) {
        if (status) status.innerHTML = 'Token not found 😢';
      }
    };

    // ================== CORE FIGHT STARTER ==================
    // loadOpponent is now handled by main.js

    window.sendAction = (action) => {
      if (window.inputManager && typeof window.inputManager.handleAction === 'function') {
        window.inputManager.handleAction(action);
      }
    };

    // Auto init
    window.addEventListener('load', async () => {
      const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const mobileControls = document.getElementById('mobile-controls');

      if (isMobile && mobileControls) {
        mobileControls.style.display = 'flex';

        // Import and attach virtual joystick
        const { VirtualJoystickAdapter } = await import('./src/virtual-joystick.js');
        window.virtualJoystick = new VirtualJoystickAdapter();
        window.virtualJoystick.attach();

        // Register as a P1 input adapter when the game is ready
        const waitForGame = setInterval(() => {
          if (window.currentGame && window.currentGame.p1Input) {
            window.currentGame.p1Input.addAdapter(window.virtualJoystick);
            clearInterval(waitForGame);
            console.log('[Joystick] Virtual joystick registered with P1 input');
          }
        }, 200);
      }

      if (window.TrendingStrip) {
        window.trendingStrip = new window.TrendingStrip('trending-strip');
        window.trendingStrip.init();
      }
      if (window.spotifyWidget) {
        window.spotifyWidget.init();
      }
      console.log('%c✅ $SMF STICK LASH FULLY LOADED — READY TO FIGHT', 'color:#ff00ff;font-size:18px');
    });
  </script>

  <!-- ORIGINAL GAME FILES -->
  <script type="module" src="./src/effects.js"></script>
  <script type="module" src="./src/fighter.js"></script>
  <script type="module" src="./src/game.js"></script>
  <script type="module" src="./src/main.js"></script>

  <!-- Local Mock for Static Server AI -->
  <script>
    const originalFetch = window.fetch;
    window.fetch = async (...args) => {
      if (args[0] === '/api/llm/command') {
        console.log('[Mock] Intercepted AI command request');
        const fallbackCommands = [
          'forward', 'back', 'jump', 'light punch', 'heavy punch', 
          'dash forward', 'hadouken', 'crouch', 'medium kick'
        ];
        const plan = [];
        for (let i = 0; i < 5; i++) {
          plan.push(fallbackCommands[Math.floor(Math.random() * fallbackCommands.length)]);
        }
        return new Response(JSON.stringify({ plan, fallback: false }), {
          status: 200,
          headers: { 'Content-Type': 'application/json' }
        });
      }
      return originalFetch(...args);
    };
  </script>

<script>
window.winnerFront = true;
window.toggleCards = () => {
  window.winnerFront = !window.winnerFront;
  const wc = document.getElementById('winner-card');
  const lc = document.getElementById('loser-card');
  const btn = document.getElementById('btn-toggle-victory');
  
  if (window.winnerFront) {
    wc.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
    wc.style.zIndex = '2';
    wc.style.filter = 'brightness(1)';
    
    lc.style.transform = 'translateX(-35%) scale(0.9) rotate(-6deg)';
    lc.style.zIndex = '1';
    lc.style.filter = 'brightness(0.3)';
    if (btn) btn.textContent = 'VIEW LOSER 🔄';
  } else {
    lc.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
    lc.style.zIndex = '2';
    lc.style.filter = 'brightness(1)';
    
    wc.style.transform = 'translateX(-65%) scale(0.9) rotate(6deg)';
    wc.style.zIndex = '1';
    wc.style.filter = 'brightness(0.3)';
    if (btn) btn.textContent = 'VIEW WINNER 🔄';
  }
};

window.captureVictory = async (winner) => {
  const status = document.getElementById('status');
  status.innerHTML = `${winner} WINS!`;

  // Show the premium victory overlay
  const overlay = document.getElementById('victory-overlay');
  const winnerName = document.getElementById('winner-name');
  const winnerLogo = document.getElementById('winner-logo');
  
  if (winner === 'P1') {
    winnerName.textContent = 'YOU ABSOLUTELY SMASHED IT!';
    winnerLogo.src = 'assets/smf-logo.png';
    winnerLogo.style.borderColor = 'var(--neon-green)';
    winnerLogo.style.boxShadow = '0 0 30px var(--neon-green)';
  } else {
    winnerName.textContent = `$${window.lastOpponentSymbol || 'MEME'} WHOOPED YOU!`;
    // use opponent logo if available
    if (window.lastOpponentLogo) winnerLogo.src = window.lastOpponentLogo;
    winnerLogo.style.borderColor = 'var(--neon-pink)';
    winnerLogo.style.boxShadow = '0 0 30px var(--neon-pink)';
    
    // Show BUY link for the opponent
    const buyBtn = document.getElementById('btn-buy-token');
    if (buyBtn && window.lastOpponentMint) {
      buyBtn.style.display = 'flex';
      buyBtn.textContent = `BUY $${window.lastOpponentSymbol || 'MEME'} 🛒`;
      buyBtn.onclick = () => window.open(`https://dexscreener.com/solana/${window.lastOpponentMint}`, '_blank');
    }
  }
  
  overlay.classList.remove('hidden');

  // Trigger coin rain
  if (window.effects) window.effects.addCoinRain();
};

window.shareVictory = async () => {
  const canvas = document.getElementById('game');
  
  // Custom text based on win/loss
  const symbol = window.lastOpponentSymbol || 'MEME';
  const text = `🥋 I just BATTLED $${symbol} in @StickLash! Solana's most viral fighting game. Join the arena: smf.sticklash.com #Solana #MemeFight`;
  
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
};

window.showMultiplayer = () => {
  const memePanel = document.getElementById('meme-panel');
  if (memePanel) memePanel.classList.add('hidden');
  if (typeof window.showScreen === 'function') {
    window.showScreen('multiplayer');
  }
};
