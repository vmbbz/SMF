<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>$SMF KARATE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { --neon-green: #00ff9d; --neon-pink: #ff00ff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      font-family: 'Press Start 2P', system-ui;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    
    #game { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
    
    /* HIDE ORIGINAL DEEPGRAM SCREENS */
    #onboarding, #leaderboard, #match-results, .mode-select, .character-select { display: none !important; }
    
    /* MOBILE-FIRST MEME PANEL */
    #meme-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10,10,10,0.95);
      border: 3px solid #fff;
      border-radius: 20px;
      padding: 25px;
      z-index: 1000;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { font-size: 20px; margin-bottom: 20px; color: #fff; }
    button {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 18px 24px;
      margin: 12px 0;
      font-size: 16px;
      width: 100%;
      border-radius: 15px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    button:hover { 
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    
    /* Mobile controls - clean & minimal */
    #mobile-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none; /* will be shown on touch */
    }
    .control-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      font-size: 24px;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 5px;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas> <!-- ORIGINAL CANVAS ID - fixed -->
  
  <!-- OUR MEME PANEL - always visible -->
  <div id="meme-panel">
    <div style="text-align:center;margin-bottom:25px;">
      <img src="assets/smf-logo.png" alt="$SMF KARATE" style="height:50px;margin-bottom:10px;">
      <div style="font-size:24px;color:#fff;font-weight:bold;">$SMF KARATE</div>
    </div>
    <button onclick="startTrendingMode()">TRENDING ARENA 🔥</button>
    <button onclick="startEndlessMode()">ENDLESS PUMP STREAM</button>
    <input id="mint-input" placeholder="PASTE $TOKEN MINT">
    <button onclick="startCustomFight()">1v1 THIS TOKEN</button>
    <div id="status" style="margin-top:15px;font-size:13px;min-height:22px;"></div>
  </div>

  <div id="mobile-controls">
    <button class="control-btn" style="margin-right:10px;">🎮</button>
    <button class="control-btn" style="margin-right:10px;">👊</button>
    <button class="control-btn">🦵</button>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="src/fighter.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
  <script src="src/effects.js"></script>
  <script src="src/token-utils.js"></script>
  <!-- your other src files -->

  <script type="module">
    // Import required functions
    import { getTrendingTokens, getTokenByMint, generatePersonality } from './src/token-utils.js';
    import { Effects } from './src/effects.js';
    
    // Global functions
    window.startTrendingMode = async () => {
      const tokens = await getTrendingTokens(8);
      if (tokens.length === 0) {
        document.getElementById('status').innerHTML = `No hot tokens right now — try pasting one!`;
        return;
      }
      const randomToken = tokens[Math.floor(Math.random() * tokens.length)];
      document.getElementById('status').innerHTML = `Fighting <strong>$${randomToken.symbol}</strong>!`;
      await window.loadOpponent(randomToken);
    };
    
    window.startCustomFight = async () => {
      const mint = document.getElementById('mint-input').value.trim();
      if (!mint) return alert('Paste a mint!');
      const token = await getTokenByMint(mint);
      document.getElementById('status').innerHTML = `Fighting <strong>$${token.symbol}</strong>!`;
      await window.loadOpponent(token);
    };
    
    window.startEndlessMode = async () => {
      document.getElementById('status').innerHTML = 'ENDLESS PUMP STREAM — Loading tokens...';
      try {
        const tokens = await getTrendingTokens(12);
        if (tokens.length === 0) {
          document.getElementById('status').innerHTML = 'No hot tokens found — try pasting one!';
          return;
        }
        document.getElementById('status').innerHTML = `🔥 ENDLESS MODE — ${tokens.length} tokens loaded`;
        console.log('Endless mode loaded with tokens:', tokens);
      } catch (e) {
        document.getElementById('status').innerHTML = 'Error loading tokens — try again!';
        console.error('Endless mode error:', e);
      }
    };
    
    // Initialize effects
    window.effects = new Effects();
    
    // Mobile controls
    if ('ontouchstart' in window) {
      document.getElementById('mobile-controls').style.display = 'flex';
    }
    
    console.log('%c✅ $SMF MOBILE-FIRST MODE LOADED', 'color:#00ff9d;font-size:18px');
  </script>
</body>
</html>
