<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>$SMF-STICKLASH</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --neon-green: #00ff9d;
      --neon-pink: #ff00ff;
      --neon-blue: #00d4ff;

      /* DG System Mapping */
      --dg-bg: #050505;
      --dg-grad-start: var(--neon-green);
      --dg-grad-end: var(--neon-pink);
      --dg-primary: var(--neon-green);
      --dg-secondary: var(--neon-pink);
      --dg-border: var(--neon-blue);
      --dg-text: #ffffff;
      --dg-charcoal: #111;
      --dg-pebble: #222;
      --dg-slate: #888;
      --dg-almost-blk: #000;
      --dg-danger: #ff4444;

      --glass-bg: rgba(10, 10, 15, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dg-bg);
      font-family: 'Press Start 2P', system-ui;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url('assets/smf-bg.jpg') no-repeat center center;
      background-size: cover;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      background: rgba(0, 0, 0, 0.3);
    }

    /* UNIFIED NAVIGATION & SCREENS */
    .screen {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      z-index: 1000;
      max-width: 450px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 157, 0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .screen.hidden {
      display: none !important;
      opacity: 0;
      transform: translate(-50%, -40%) scale(0.9);
    }

    .premium-btn {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 20px;
      margin: 10px 0;
      font-size: 14px;
      width: 100%;
      border-radius: 16px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .premium-btn:hover {
      background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
      border-color: transparent;
      color: #000;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0, 255, 157, 0.3);
    }

    .premium-btn.pink:hover {
      background: linear-gradient(135deg, var(--neon-pink), #ff0055);
      box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3);
    }

    .victory-btn {
      min-height: 44px;
      padding: 8px 10px;
      font-size: 12px;
      margin: 0;
      font-weight: bold;
    }

    .victory-btn.dark {
      background: #333;
      color: #fff;
    }

    .victory-btn.dark:hover {
      background: #444 !important;
      color: #fff !important;
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
    }

    input {
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--glass-border);
      color: var(--neon-green);
      font-size: 14px;
      border-radius: 14px;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
    }

    #victory-overlay {
      background: radial-gradient(circle, rgba(10, 10, 15, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 500px;
      width: 95%;
      padding: 10px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 255, 157, 0.15);
    }

    /* Endless mode session header — shown above the KO/YOU WIN text */
    #endless-session-header {
      display: none;
      /* shown only in endless mode */
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 6px;
    }

    #endless-session-header .round-badge {
      color: var(--neon-blue);
      font-weight: 700;
      font-size: 13px;
    }

    #endless-session-header .record-badge {
      color: #aaa;
    }

    #endless-session-header .streak-badge {
      color: var(--neon-green);
    }

    /* 8-second countdown bar */
    #endless-countdown {
      display: none;
      /* shown only in endless mode */
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      width: 100%;
    }

    #endless-countdown-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      font-family: 'Orbitron', monospace;
    }

    #endless-countdown-bar-wrap {
      width: 80%;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    #endless-countdown-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
      border-radius: 3px;
      transition: width linear;
    }


    /* Mobile-only: tighter trending strip pills */
    @media (max-width: 768px) {
      .token-pill {
        padding: 2px 7px 2px 2px !important;
        margin-right: 6px !important;
        border-radius: 14px !important;
      }

      .token-pill img {
        width: 18px !important;
        height: 18px !important;
        margin-right: 5px !important;
      }

      .token-pill .symbol {
        font-size: 10px !important;
        margin-right: 5px !important;
      }

      .token-pill .power {
        font-size: 9px !important;
      }
    }

    .loser-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .rich-tabs button {
      background: transparent;
      color: #888;
      border: none;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      padding: 5px 10px;
      transition: all 0.3s ease;
      border-radius: 6px;
    }

    .rich-tabs button.active {
      color: #fff;
      background: rgba(255, 0, 255, 0.2);
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
    }

    .rich-tabs button:hover {
      color: #fff;
    }

    .ko-text {
      width: 100%;
      font-size: 110px;
      font-weight: 900;
      font-style: italic;
      color: var(--neon-pink);
      text-shadow: 0 0 40px var(--neon-pink), 0 0 10px #fff;
      margin-top: -50px;
      margin-bottom: 20px;
      letter-spacing: -5px;
      animation: punchIn 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #victory-token-info {
      display: flex;
      align-items: center;
      gap: 30px;
      background: rgba(255, 255, 255, 0.03);
      padding: 40px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    @keyframes punchIn {
      0% {
        transform: scale(3);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #status {
      height: 20px;
      font-size: 11px;
      margin-top: 10px;
      color: var(--neon-blue);
    }

    /* Original screens - ensure they fit theme */
    #multiplayer-menu,
    #character-select,
    #join-room,
    #room-lobby,
    #match-results,
    #leaderboard,
    #onboarding {
      display: block;
      /* reset display:none */
    }

    /* =============================================
       MOBILE VIRTUAL JOYSTICK — FULL CONTROL PAD
       Only shown on touch/mobile screens (≤768px or touch device).
       Hidden on desktop via CSS — JS also gates it with isMobile check.
       ============================================= */
    #mobile-controls {
      position: fixed;
      bottom: 62px;
      /* sits above trending strip */
      left: 0;
      right: 0;
      display: none;
      /* hidden by default on all screens */
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 16px 12px;
      z-index: 600;
      pointer-events: none;
    }

    /* Left side – joystick zone (restored to original size, base centred) */
    .joystick-zone {
      pointer-events: auto;
      position: relative;
      width: 140px;
      height: 140px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystick-base {
      width: 130px;
      height: 130px;
      background: rgba(0, 0, 0, 0.78);
      border: 3px solid rgba(0, 255, 157, 0.65);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.25), inset 0 0 20px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      touch-action: none;
      user-select: none;
    }

    #joystick-knob {
      width: 46px;
      height: 46px;
      background: radial-gradient(circle at 35% 35%, rgba(255, 0, 255, 0.9), rgba(180, 0, 255, 0.85));
      border: 2px solid rgba(0, 255, 157, 0.8);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 14px rgba(255, 0, 255, 0.5);
      transition: box-shadow 0.1s;
      pointer-events: none;
    }

    /* Crosshair guides inside joystick */
    #joystick-base::before,
    #joystick-base::after {
      content: '';
      position: absolute;
      background: rgba(0, 255, 157, 0.12);
      border-radius: 2px;
    }

    #joystick-base::before {
      width: 2px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }

    #joystick-base::after {
      height: 2px;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Right side – attack buttons: SPECIAL octagon top, then 2×2 circle grid */
    .attack-zone {
      pointer-events: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr 1fr;
      gap: 7px;
      width: 136px;
      flex-shrink: 0;
    }

    .atk-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      font-size: 9px;
      font-weight: 900;
      font-family: inherit;
      letter-spacing: 0.4px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      transition: transform 0.07s, box-shadow 0.07s;
      touch-action: manipulation;
      user-select: none;
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
    }

    .atk-btn .icon {
      font-size: 15px;
      line-height: 1;
      display: block;
    }

    .atk-btn.active,
    .atk-btn:active {
      transform: scale(0.88);
    }

    /* Button color coding */
    .atk-btn.punch-light {
      background: rgba(0, 180, 255, 0.35);
      border-color: rgba(0, 180, 255, 0.6);
      box-shadow: 0 0 10px rgba(0, 180, 255, 0.2);
    }

    .atk-btn.punch-heavy {
      background: rgba(80, 0, 255, 0.4);
      border-color: rgba(120, 60, 255, 0.7);
      box-shadow: 0 0 10px rgba(100, 0, 255, 0.3);
    }

    .atk-btn.kick-light {
      background: rgba(255, 100, 0, 0.35);
      border-color: rgba(255, 140, 0, 0.6);
      box-shadow: 0 0 10px rgba(255, 100, 0, 0.2);
    }

    .atk-btn.kick-heavy {
      background: rgba(200, 0, 60, 0.4);
      border-color: rgba(255, 0, 80, 0.7);
      box-shadow: 0 0 10px rgba(200, 0, 60, 0.3);
    }


    @keyframes sp-pulse {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(255, 200, 0, 0.5), 0 0 20px rgba(255, 200, 0, 0.2);
      }

      50% {
        box-shadow: 0 0 18px rgba(255, 200, 0, 0.9), 0 0 40px rgba(255, 200, 0, 0.4);
      }
    }

    .atk-btn.btn-hadouken {
      background: linear-gradient(135deg, rgba(255, 180, 0, 0.35), rgba(255, 80, 0, 0.3));
      border: 2px solid rgba(255, 200, 0, 0.85);
      grid-column: span 2;
      /* Octagon clip-path */
      clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
      border-radius: 0;
      aspect-ratio: 1;
      width: 60px;
      max-width: 60px;
      height: 60px;
      border-radius: 50%;
      padding: 0;
      font-size: 10px;
      letter-spacing: 1px;
      color: #ffe066;
      animation: sp-pulse 2s ease-in-out infinite;
      grid-row: 1;
      place-self: center;
      order: -1;
    }

    /* HUD Widgets — bottom on PC, near-centre on mobile */
    #hud-widgets {
      position: fixed;
      bottom: 77px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 601;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 768px),
    (hover: none) and (pointer: coarse) {
      #hud-widgets {
        bottom: auto;
        top: 10%;
        transform: translate(-50%, -50%);
      }

      /* Scale down all hud-widgets text on mobile */
      #hud-widgets,
      #hud-widgets button,
      #hud-widgets span,
      #hud-widgets .spotify-widget,
      #hud-widgets .connect-btn,
      #hud-widgets #track-name,
      #hud-widgets .controls button {
        font-size: 12px !important;
      }

      /* Slightly tighten spotify pill padding on mobile */
      #hud-widgets .spotify-widget {
        padding: 4px 8px !important;
        gap: 6px !important;
      }
    }

    .victory-card,
    .token-pill {
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      touch-action: manipulation;
    }

    .marquee {
      overflow: hidden;
      white-space: nowrap;
      display: flex;
      gap: 16px;
    }

    /* Premium Logo Glitch Keyframes */
    @keyframes logo-glitch {
      0% {
        clip-path: inset(40% 0 61% 0);
        transform: skew(0.3deg) scale(1.02);
        filter: hue-rotate(90deg) saturate(1.5) drop-shadow(-3px 0 var(--neon-pink)) drop-shadow(3px 0 var(--neon-blue));
      }
      20% {
        clip-path: inset(92% 0 1% 0);
        transform: skew(-0.5deg) scale(0.98);
        filter: hue-rotate(180deg) saturate(2) drop-shadow(-3px 0 var(--neon-blue)) drop-shadow(3px 0 var(--neon-pink));
      }
      40% {
        clip-path: inset(15% 0 80% 0);
        transform: skew(0.5deg) scale(1.04);
        filter: none;
      }
      60% {
        clip-path: inset(80% 0 5% 0);
        transform: skew(-0.3deg) scale(0.96);
        filter: invert(0.2) hue-rotate(45deg);
      }
      80% {
        clip-path: inset(3% 0 92% 0);
        transform: skew(0.8deg) scale(1.01);
        filter: none;
      }
      100% {
        clip-path: inset(0 0 0 0);
        transform: skew(0deg) scale(1);
      }
    }

    .logo-glitching {
      animation: logo-glitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
  </style>
</head>

<body>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>

  <!-- TRENDING STRIP (Floor level for main menu) -->
  <div id="trending-strip" class="trending-strip"
    style="position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%); border-top: 3px solid var(--neon-pink); padding: 6px 15px; z-index: 500; backdrop-filter: blur(10px); box-sizing: border-box; box-shadow: 0 -10px 20px rgba(255,0,255,0.15);">
  </div>

  <!-- TRENDING STRIP (During Fight, hidden by default until fight starts) -->
  <div id="fight-trending-strip" class="trending-strip"
    style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%); border-top: 3px solid var(--neon-green); padding: 6px 15px; z-index: 100; backdrop-filter: blur(10px); box-sizing: border-box; box-shadow: 0 -10px 20px rgba(0,255,157,0.15);">
  </div>


  <!-- HUD WIDGETS (Bottom Center on PC, vertically centred on mobile) -->
  <div id="hud-widgets">
    <!-- SPOTIFY WIDGET -->
    <div id="spotify-widget" class="bottom-panel"></div>

    <!-- WEATHER TOGGLE -->
    <button id="btn-weather" onclick="if(window.toggleWeather) window.toggleWeather()"
      style="background:rgba(0,0,0,0.8); border:2px solid var(--neon-blue); border-radius:30px; color:#fff; padding:8px 16px; font-weight:bold; font-size:12px !important; cursor:pointer; display:flex; align-items:center; gap:5px; font-family:inherit; white-space:nowrap; backdrop-filter:blur(5px);">
      🌧️ WEATHER
    </button>
  </div>

  <!-- MEME PANEL (Main Menu) -->
  <div id="meme-panel" class="screen" style="top: 42%;">
    <div style="text-align:center;margin-bottom:30px;">
      <img id="landing-logo" src="assets/smf-logo.png" alt="$SMF"
        style="height:140px;margin-bottom:20px;max-width:95%;filter: drop-shadow(0 0 15px var(--neon-green));transition: filter 0.3s ease, transform 0.2s ease;">
      <div
        style="font-size:24px;color:#fff;font-weight:bold;letter-spacing:2px;text-shadow: 0 0 10px var(--neon-pink);">
        STICKLASH</div>
      <script>
        (function() {
          const logos = ['assets/smf-logo.png', 'assets/smf-logo-alt.png'];
          const shadowColors = ['var(--neon-green)', 'var(--neon-pink)'];
          let idx = 0;
          setInterval(() => {
            const logo = document.getElementById('landing-logo');
            if (!logo) return;
            logo.classList.add('logo-glitching');
            setTimeout(() => {
              idx = (idx + 1) % logos.length;
              logo.src = logos[idx];
              logo.style.filter = `drop-shadow(0 0 15px ${shadowColors[idx]})`;
            }, 200);
            setTimeout(() => {
              logo.classList.remove('logo-glitching');
            }, 400);
          }, 7000);
        })();
      </script>
    </div>
    <button class="premium-btn" onclick="startTrendingMode()">TRENDING ARENA 🔥</button>
    <button class="premium-btn" onclick="startEndlessMode()">ENDLESS PUMP STREAM</button>
    <div style="display:flex;gap:10px;margin:10px 0;">
      <input id="mint-input" placeholder="TOKEN MINT..." style="margin:0;flex:1;">
      <button class="premium-btn" onclick="startCustomFight()"
        style="width:auto;margin:0;padding:10px 20px;">FIGHT</button>
    </div>
    <button class="premium-btn pink" onclick="showMultiplayer()">MULTIPLAYER 🌐</button>
    <div id="status"></div>
  </div>

  <!-- VICTORY OVERLAY -->
  <div id="victory-overlay" class="screen hidden">

    <!-- Endless mode: session stats header (hidden in single-fight mode) -->
    <div id="endless-session-header">
      <span class="round-badge" id="endless-round-label">ROUND 1</span>
      <span class="record-badge" id="endless-record-label">0W · 0L</span>
      <span class="streak-badge" id="endless-streak-label"></span>
    </div>

    <div id="victory-text" class="ko-text"
      style="transition: transform 0.15s cubic-bezier(0.25,0.46,0.45,0.94), font-size 0.15s cubic-bezier(0.25,0.46,0.45,0.94); transform-origin: top center; position: relative; z-index: 10; background: rgba(0,0,0,0.6); border-radius: 12px; padding: 4px 16px;">
      YOU WIN!</div>

    <div class="cards-container"
      style="position: relative; width: 100%; height: 350px; margin-top: 0px; perspective: 1200px;">
      <!-- BACK CARD (Dynamically populated) -->
      <div id="loser-card" class="victory-card loser"
        onclick="if(event.target.tagName!=='BUTTON' && !event.target.closest('button')) toggleCards()"
        style="position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(1) rotateY(180deg); z-index: 1; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: rgba(15,15,15,0.95); border: 2px solid white; border-radius: 20px; padding: 10px; text-align: center; width: 300px; max-width: 90%; box-sizing: border-box; box-shadow: 0 0 25px var(--neon-pink); overflow-y: auto; max-height: 100%; backface-visibility: hidden;">
        <div id="back-card-content"></div>
      </div>

      <!-- FRONT CARD (Dynamically populated) -->
      <div id="winner-card" class="victory-card winner"
        onclick="if(event.target.tagName!=='BUTTON' && !event.target.closest('button')) toggleCards()"

  <script type="module">
    import { getTrendingTokens, getTokenByMint, generatePersonality } from './src/token-utils.js';
    import { Effects } from './src/effects.js';

    // Global exports
    window.getTrendingTokens = getTrendingTokens;
    window.getTokenByMint = getTokenByMint;
    window.generatePersonality = generatePersonality;
    window.effects = new Effects();

    let pumpQueue = [];

    // ================== MAIN MEME FUNCTIONS ==================
    window.startTrendingMode = async () => {
      const status = document.getElementById('status');
      if (status) status.innerHTML = 'Fetching trending tokens...';

      try {
        const { getTrendingTokens } = await import('./src/token-utils.js');
        const tokens = await getTrendingTokens(8);
        if (!tokens || tokens.length === 0) throw new Error('No tokens found');

        const randomToken = tokens[Math.floor(Math.random() * tokens.length)];
        if (status) status.innerHTML = `Fighting <strong>$${randomToken.symbol}</strong>!`;

        // Use unified global setter from main.js
        if (window.setGameMode) window.setGameMode(undefined, 4); // LLM Mode

        await window.loadOpponent(randomToken);
      } catch (err) {
        console.error('Trending mode failed:', err);
        if (status) status.innerHTML = 'Failed to load tokens.';
      } finally {
        // FORCE HIDE panel to unblock game
        const memePanel = document.getElementById('meme-panel');
        if (memePanel) memePanel.classList.add('hidden');
        const canvas = document.getElementById('game');
        if (canvas) canvas.classList.add('active');
        if (window._showMobileControls) window._showMobileControls();
      }
    };

    window.startEndlessMode = async () => {
      const status = document.getElementById('status');
      status.innerHTML = 'ENDLESS PUMP STREAM — loading...';

      // Mark session as endless so victory overlay shows countdown
      if (window.endlessSession) {
        window.endlessSession.active = true;
        window.endlessSession.round = 0;
        window.endlessSession.wins = 0;
        window.endlessSession.losses = 0;
        window.endlessSession.streak = 0;
      }

      pumpQueue = await getTrendingTokens(12);
      window.pumpQueue = pumpQueue; // expose globally for nextFight()

      if (pumpQueue.length === 0) {
        status.innerHTML = 'No tokens matched filter — check console for raw data';
        return;
      }
      if (window._showMobileControls) window._showMobileControls();
      await loadOpponent(pumpQueue.shift());
    };

    window.startCustomFight = async () => {
      const mint = document.getElementById('mint-input').value.trim();
      if (!mint) return alert('Paste a mint address!');
      // Single-token paste = NOT endless mode
      if (window.endlessSession) window.endlessSession.active = false;
      await window.fightToken(mint);
    };

    window.fightToken = async (mint) => {
      const status = document.getElementById('status');
      if (status) status.innerHTML = 'Loading token...';
      try {
        const token = await getTokenByMint(mint);
        if (status) status.innerHTML = `Fighting <strong>$${token.symbol}</strong>!`;

        // Hide panel
        const memePanel = document.getElementById('meme-panel');
        if (memePanel) memePanel.classList.add('hidden');
        const canvas = document.getElementById('game');
        if (canvas) canvas.classList.add('active');
        if (window._showMobileControls) window._showMobileControls();

        await loadOpponent(token);
      } catch (e) {
        if (status) status.innerHTML = 'Token not found 😢';
      }
    };

    // ================== CORE FIGHT STARTER ==================
    // loadOpponent is now handled by main.js

    window.sendAction = (action) => {
      if (window.inputManager && typeof window.inputManager.handleAction === 'function') {
        window.inputManager.handleAction(action);
      }
    };

    // Auto init
    window.addEventListener('load', async () => {
      const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
      const mobileControls = document.getElementById('mobile-controls');

      if (isMobile && mobileControls) {
        // START HIDDEN — shown only when a fight begins
        mobileControls.style.display = 'none';

        // Import and attach virtual joystick touch listeners (once at page load)
        const { VirtualJoystickAdapter } = await import('./src/virtual-joystick.js');
        window.virtualJoystick = new VirtualJoystickAdapter();
        window.virtualJoystick.attach();

        // Global helper — called by every game launcher AND resetAndFight.
        // Shows the controls AND guarantees the joystick is registered
        // with the CURRENT p1Input (new one created on every resetAndFight).
        window._showMobileControls = () => {
          mobileControls.style.display = 'flex';

          // Poll until p1Input is available then register/re-register
          let retries = 0;
          const poll = setInterval(() => {
            const g = window.currentGame;
            if (g && g.p1Input) {
              const adapters = g.p1Input.adapters || [];
              if (!adapters.includes(window.virtualJoystick)) {
                g.p1Input.addAdapter(window.virtualJoystick);
                console.log('[Joystick] Registered with current p1Input');
              }
              window.virtualJoystick._registered = true;
              clearInterval(poll);
            } else if (++retries > 50) {
              clearInterval(poll); // give up after 5s
              console.warn('[Joystick] Timed out waiting for p1Input');
            }
          }, 100);
        };

        // Also wire up a persistent watcher — handles edge cases where
        // resetAndFight creates a new game before _showMobileControls fires
        setInterval(() => {
          if (!window.virtualJoystick || !window.currentGame) return;
          const g = window.currentGame;
          if (!g.p1Input) return;
          const adapters = g.p1Input.adapters || [];
          if (!adapters.includes(window.virtualJoystick) &&
            mobileControls.style.display !== 'none') {
            g.p1Input.addAdapter(window.virtualJoystick);
            console.log('[Joystick] Auto-recovered registration with new game');
          }
        }, 500);
      }

      if (window.TrendingStrip) {
        window.trendingStrip = new window.TrendingStrip('trending-strip');
        window.trendingStrip.init();
      }
      if (window.spotifyWidget) {
        window.spotifyWidget.init();
      }
      console.log('%c✅ $SMF STICK LASH FULLY LOADED — READY TO FIGHT', 'color:#ff00ff;font-size:18px');
    });
  </script>

  <script>
    const originalFetch = window.fetch;
    window.fetch = async (...args) => {
      if (args[0] === '/api/llm/command') {
        console.log('[Mock] Intercepted AI command request');
        const fallbackCommands = [
          'forward', 'back', 'jump', 'light punch', 'heavy punch',
          'dash forward', 'hadouken', 'crouch', 'medium kick'
        ];
        const plan = [];
        for (let i = 0; i < 5; i++) {
          plan.push(fallbackCommands[Math.floor(Math.random() * fallbackCommands.length)]);
        }
        return new Response(JSON.stringify({ plan, fallback: false }), {
          status: 200,
          headers: { 'Content-Type': 'application/json' }
        });
      }
      return originalFetch(...args);
    };
  </script>

  <script>
    window.winnerFront = true;
    window.toggleCards = () => {
      window.winnerFront = !window.winnerFront;
      const wc = document.getElementById('winner-card');
      const lc = document.getElementById('loser-card');
      const btn = document.getElementById('btn-toggle-victory');

      if (window.winnerFront) {
        wc.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
        wc.style.zIndex = '2';
        wc.style.filter = 'brightness(1)';

        lc.style.transform = 'translateX(-35%) scale(0.9) rotate(-6deg)';
        lc.style.zIndex = '1';

        if (btn) btn.textContent = 'VIEW LOSER 🔄';
      } else {
        lc.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
        lc.style.zIndex = '2';
        lc.style.filter = 'brightness(1)';

        wc.style.transform = 'translateX(-65%) scale(0.9) rotate(6deg)';
        wc.style.zIndex = '1';
        wc.style.filter = 'brightness(0.3)';
        if (btn) btn.textContent = 'VIEW WINNER 🔄';
      }
    };

    window.captureVictory = async (winner) => {
      const status = document.getElementById('status');
      status.innerHTML = `${winner} WINS!`;

      // Show the premium victory overlay
      const overlay = document.getElementById('victory-overlay');
      const winnerName = document.getElementById('winner-name');
      const winnerLogo = document.getElementById('winner-logo');

      if (winner === 'P1') {
        winnerName.textContent = 'YOU ABSOLUTELY SMASHED IT!';
        winnerLogo.src = 'assets/smf-logo.png';
        winnerLogo.style.borderColor = 'var(--neon-green)';
        winnerLogo.style.boxShadow = '0 0 30px var(--neon-green)';
      } else {
        winnerName.textContent = `$${window.lastOpponentSymbol || 'MEME'} WHOOPED YOU!`;
        // use opponent logo if available
        if (window.lastOpponentLogo) winnerLogo.src = window.lastOpponentLogo;
        winnerLogo.style.borderColor = 'var(--neon-pink)';
        winnerLogo.style.boxShadow = '0 0 30px var(--neon-pink)';

        // Show BUY link for the opponent
        const buyBtn = document.getElementById('btn-buy-token');
        if (buyBtn && window.lastOpponentMint) {
          buyBtn.style.display = 'flex';
          buyBtn.textContent = `BUY $${window.lastOpponentSymbol || 'MEME'} 🛒`;
          buyBtn.onclick = () => window.open(`https://dexscreener.com/solana/${window.lastOpponentMint}`, '_blank');
        }
      }

      overlay.classList.remove('hidden');

      // Trigger coin rain
      if (window.effects) window.effects.addCoinRain();
    };

    window.shareVictory = async () => {
      const canvas = document.getElementById('game');

      // Custom text based on win/loss
      const symbol = window.lastOpponentSymbol || 'MEME';
      const text = `🥋 I just BATTLED $${symbol} in @StickLash! Solana's most viral fighting game. Join the arena: smf.sticklash.com #Solana #MemeFight`;

      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
    };

    window.showMultiplayer = () => {
      const memePanel = document.getElementById('meme-panel');
      if (memePanel) memePanel.classList.add('hidden');
      if (typeof window.showScreen === 'function') {
        window.showScreen('multiplayer');
      }
    };
  </script>
