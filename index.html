<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>$SMF-STICKLASH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { --neon-green: #00ff9d; --neon-pink: #ff00ff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      font-family: 'Press Start 2P', system-ui;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }
    #game { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
    
    /* HIDE ORIGINAL DEEPGRAM SCREENS */
    #onboarding, #leaderboard, #match-results, .mode-select, .character-select { display: none !important; }
    
    /* MEME PANEL */
    #meme-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10,10,10,0.95);
      border: 3px solid #fff;
      border-radius: 20px;
      padding: 25px;
      z-index: 1000;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { font-size: 24px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 15px var(--neon-pink); }
    button {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 18px 24px;
      margin: 12px 0;
      font-size: 16px;
      width: 100%;
      border-radius: 15px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    button:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    input {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      background: #111;
      border: 2px solid var(--neon-green);
      color: #fff;
      font-size: 15px;
      border-radius: 12px;
    }
    #status { margin-top: 15px; font-size: 13px; min-height: 22px; color: var(--neon-green); }
    
    /* Mobile controls */
    #mobile-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
    }
    .control-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      font-size: 24px;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 5px;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- MEME PANEL -->
  <div id="meme-panel">
    <div style="text-align:center;margin-bottom:25px;">
      <img src="./assets/smf-logo.png" alt="$SMF" style="height:60px;margin-bottom:10px;" onerror="this.src='https://via.placeholder.com/60x60/ff00ff/ffffff?text=SMF';console.error('Logo failed to load, using fallback');">
      <div style="font-size:28px;color:#fff;font-weight:bold;">STICK|LASH</div>
    </div>
    <button onclick="startTrendingMode()">TRENDING ARENA 🔥</button>
    <button onclick="startEndlessMode()">ENDLESS PUMP STREAM</button>
    <input id="mint-input" placeholder="PASTE $TOKEN MINT">
    <button onclick="startCustomFight()">1v1 THIS TOKEN</button>
    <div id="status"></div>
  </div>

  <div id="mobile-controls">
    <button class="control-btn" onclick="sendAction('left')">←</button>
    <button class="control-btn" onclick="sendAction('jump')">↑</button>
    <button class="control-btn" onclick="sendAction('right')">→</button>
    <button class="control-btn" onclick="sendAction('lightPunch')" style="margin-left:20px;">👊</button>
    <button class="control-btn" onclick="sendAction('heavyKick')">🥋</button>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="src/fighter.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
  <script src="src/effects.js"></script>
  <script src="src/token-utils.js"></script>

  <script type="module">
    // Import required functions
    import { getTrendingTokens, getTokenByMint, generatePersonality } from './src/token-utils.js';
    import { Effects } from './src/effects.js';

    // Global exports
    window.getTrendingTokens = getTrendingTokens;
    window.getTokenByMint = getTokenByMint;
    window.generatePersonality = generatePersonality;
    window.effects = new Effects();

    let pumpQueue = [];

    // ================== MAIN MEME FUNCTIONS ==================
    window.startTrendingMode = async () => {
      const status = document.getElementById('status');
      status.innerHTML = 'Loading trending tokens...';
      const tokens = await getTrendingTokens(8);
      if (tokens.length === 0) {
        status.innerHTML = 'No hot tokens right now — try pasting one!';
        return;
      }
      const token = tokens[Math.floor(Math.random() * tokens.length)];
      status.innerHTML = `Fighting <strong>$${token.symbol}</strong>!`;
      await loadOpponent(token);
    };

    window.startEndlessMode = async () => {
      const status = document.getElementById('status');
      status.innerHTML = 'ENDLESS PUMP STREAM — loading...';
      pumpQueue = await getTrendingTokens(12);
      if (pumpQueue.length > 0) await loadOpponent(pumpQueue.shift());
    };

    window.startCustomFight = async () => {
      const mint = document.getElementById('mint-input').value.trim();
      if (!mint) return alert('Paste a mint address!');
      const status = document.getElementById('status');
      status.innerHTML = 'Loading token...';
      try {
        const token = await getTokenByMint(mint);
        status.innerHTML = `Fighting <strong>$${token.symbol}</strong>!`;
        await loadOpponent(token);
      } catch (e) {
        status.innerHTML = 'Token not found 😢';
      }
    };

    // ================== CORE FIGHT STARTER ==================
    async function loadOpponent(token) {
      // Wait for the original game to be fully ready
      if (!window.game || !window.game.opponent) {
        console.log('Game not ready yet, retrying...');
        setTimeout(() => loadOpponent(token), 200);
        return;
      }

      const opponent = window.game.opponent;
      await opponent.loadTokenHead(token);

      // Market sauce
      let volumeBoost = 1;
      try {
        const res = await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${token.mint}`);
        const data = await res.json();
        volumeBoost = Math.min(2, 1 + (data.pairs?.[0]?.volume?.m5 || 0) / 500000);
      } catch(e) {}

      if (opponent.healthMax) opponent.healthMax = Math.floor(opponent.healthMax * volumeBoost);
      if (opponent.health) opponent.health = Math.floor(opponent.health * volumeBoost);
      opponent.speed = (opponent.speed || 1) * volumeBoost;

      // Personality TTS
      if (opponent.personality && opponent.personality.taunts && opponent.personality.taunts.length > 0) {
        const utterance = new SpeechSynthesisUtterance(opponent.personality.taunts[0]);
        utterance.pitch = opponent.personality.pitch || 1;
        utterance.rate = opponent.personality.rate || 1;
        speechSynthesis.speak(utterance);
      }

      // START THE FIGHT
      console.log('%c🚀 Starting fight vs $' + token.symbol, 'color:#ff00ff');
      
      // Wait for game to be fully ready
      const startFight = () => {
        if (window.game && typeof window.game.start === 'function') {
          window.game.start();
        } else {
          console.log('Game not ready yet, retrying...');
          setTimeout(startFight, 500);
        }
      };
      
      startFight();
    }

    window.loadOpponent = loadOpponent;   // make it global

    window.sendAction = (action) => {
      if (window.inputManager && typeof window.inputManager.handleAction === 'function') {
        window.inputManager.handleAction(action);
      }
    };

    // Auto init
    window.addEventListener('load', () => {
      if ('ontouchstart' in window) {
        document.getElementById('mobile-controls').style.display = 'flex';
      }
      console.log('%c✅ $SMF STICK LASH FULLY LOADED — READY TO FIGHT', 'color:#ff00ff;font-size:18px');
    });
  </script>

  <!-- ORIGINAL GAME FILES -->
  <script src="./src/fighter.js"></script>
  <script src="./src/game.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
