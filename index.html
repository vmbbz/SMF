<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>$SMF KARATE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { --neon-green: #00ff9d; --neon-pink: #ff00ff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: 
        radial-gradient(circle at center, #0a0a0a, #000),
        url('assets/smf-bg.jpg') center/cover no-repeat;
      font-family: 'Press Start 2P', system-ui;
      color: var(--neon-green);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* Frosted glass overlay for main content */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 10, 0.3);
      backdrop-filter: blur(8px);
      z-index: 1;
    }
    
    /* Game and panel above frosted layer */
    #game, #meme-panel, #mobile-controls {
      position: relative;
      z-index: 2;
    }
    #game { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
    
    /* HIDE ORIGINAL DEEPGRAM SCREENS */
    #onboarding, #leaderboard, #match-results, .mode-select, .character-select { display: none !important; }
    
    /* EPIC MEME PANEL - bigger, centered on mobile */
    #meme-panel {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(10,10,10,0.95);
      border: 5px solid var(--neon-green);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 40px var(--neon-green);
      z-index: 999;
      max-width: 380px;
      width: 92%;
      text-align: center;
    }
    h1 { font-size: 28px; margin-bottom: 15px; text-shadow: 0 0 20px var(--neon-pink); }
    button {
      background: #111;
      color: var(--neon-pink);
      border: 4px solid var(--neon-pink);
      padding: 16px 24px;
      margin: 10px 5px;
      font-size: 15px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 20px var(--neon-pink);
      transition: all 0.2s;
    }
    button:hover { transform: scale(1.08); box-shadow: 0 0 30px var(--neon-pink); }
    
    /* Mobile controls - BIG & chunky */
    #mobile-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 1000;
      display: none; /* will be shown on touch */
    }
    .control-btn {
      background: rgba(255,0,255,0.4);
      border: 5px solid var(--neon-pink);
      color: white;
      font-size: 28px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px var(--neon-pink);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas> <!-- ORIGINAL CANVAS ID - fixed -->
  
  <!-- OUR MEME PANEL - always visible -->
  <div id="meme-panel">
    <h1><img src="assets/smf-logo.png" alt="$SMF KARATE" style="height:40px;vertical-align:middle;margin-right:10px;">$SMF KARATE</h1>
    <button onclick="startTrendingMode()">TRENDING ARENA 🔥</button>
    <button onclick="startEndlessMode()">ENDLESS PUMP STREAM</button>
    <input id="mint-input" placeholder="PASTE $TOKEN MINT" style="width:100%;padding:16px;margin:10px 0;background:#111;border:4px solid var(--neon-green);color:var(--neon-green);font-size:16px;border-radius:12px;">
    <button onclick="startCustomFight()">1v1 THIS TOKEN</button>
    <div id="status" style="margin-top:15px;font-size:13px;min-height:22px;"></div>
  </div>

  <div id="mobile-controls"></div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="src/fighter.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
  <script src="src/effects.js"></script>
  <script src="src/token-utils.js"></script>
  <!-- your other src files -->

  <script>
    // Force meme-first flow + hide original screens
    window.addEventListener('load', () => {
      document.querySelectorAll('#onboarding, .mode-select, .character-select').forEach(el => el.style.display = 'none');
      initMobileControls();
      console.log('%c✅ $SMF EPIC MODE LOADED', 'color:#ff00ff;font-size:18px');
    });
  </script>
</body>
</html>
